<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Villa Shopping Organizer</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            }

            body {
                background: #f6f8fc;
                padding: 20px;
            }

            h1 {
                text-align: center;
                margin-bottom: 20px;
                font-weight: 600;
            }

            .container {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
                gap: 18px;
            }

            .column {
                background: white;
                border-radius: 16px;
                padding: 16px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            }

            .item {
                background: #f8fafc;
                padding: 12px;
                margin-bottom: 8px;
                border-radius: 10px;
                cursor: grab;
                position: relative;
            }

            .delete {
                position: absolute;
                right: 8px;
                top: 8px;
                display: none;
                cursor: pointer;
                color: #ef4444;
            }

            .item:hover .delete {
                display: block;
            }

            .add-section {
                display: flex;
                gap: 8px;
                margin-bottom: 12px;
            }

            input,
            select,
            textarea {
                padding: 8px;
                border-radius: 8px;
                border: 1px solid #e5e7eb;
            }

            button {
                padding: 8px 12px;
                border: none;
                border-radius: 8px;
                background: #4f46e5;
                color: white;
                cursor: pointer;
                font-size: 13px;
            }

            .copy-btn {
                background: #10b981;
            }
            .export-btn {
                background: #f59e0b;
            }
            .import-btn {
                background: #ef4444;
            }
            .rename-btn {
                background: #6366f1;
            }
            .sort-btn {
                background: #0ea5e9;
            }

            .add-category {
                margin-bottom: 20px;
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }

            textarea {
                width: 100%;
                margin-top: 10px;
            }

            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 10px;
            }

            .persons {
                margin-bottom: 15px;
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                align-items: center;
            }

            .persons #personList {
                display: flex;
                gap: 6px;
                flex-wrap: wrap;
            }

            .person {
                background: #eef2ff;
                padding: 6px 12px;
                border-radius: 999px;
                border: 1px solid #dbeafe;
                cursor: pointer;
                font-size: 12px;
            }

            /* --- NEW STYLES FOR PRICING AND SUMMARY --- */
            .price-input {
                width: 70px;
            }

            .summary-section {
                margin-top: 30px;
                background: white;
                padding: 20px;
                border-radius: 16px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            }

            .summary-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 15px;
            }

            .summary-table th,
            .summary-table td {
                border: 1px solid #e5e7eb;
                padding: 10px;
                text-align: left;
                font-size: 14px;
            }

            .summary-table th {
                background: #f8fafc;
                font-weight: 600;
            }

            .total-row {
                background: #f1f5f9;
                font-weight: bold;
            }
        </style>
    </head>

    <body>
        <h1>🛒 Villa Shopping Organizer</h1>

        <div class="persons">
            <input id="personInput" placeholder="Add Person" />
            <button onclick="addPerson()">Add</button>
            <div id="personList"></div>
        </div>

        <div class="add-category">
            <input id="categoryInput" placeholder="Add Category" />
            <button onclick="addCategory()">Add</button>
            <button class="export-btn" onclick="exportData()">Export</button>
            <button class="import-btn" onclick="importData()">Import</button>
            <button class="sort-btn" onclick="sortAll()">Sort</button>
        </div>

        <textarea id="jsonBox" rows="4"></textarea>

        <div class="container" id="container"></div>

        <div
            id="summarySection"
            class="summary-section"
            style="display: none"
        ></div>

        <script src="https://zestlark.github.io/z-notify/index.js"></script>

        <script>
            const notifyConfig = {
                x: "end",
                y: "top",
                options: { timeout: 2000 },
            };

            const notification = new Notification(notifyConfig);

            let draggedItem = null;

            let persons = JSON.parse(localStorage.getItem("persons")) || [
                "Deepak",
            ];

            function renderPersons() {
                const list = document.getElementById("personList");
                list.innerHTML = "";

                persons.forEach((p) => {
                    const el = document.createElement("div");
                    el.className = "person";
                    el.textContent = p;

                    el.onclick = () => {
                        persons = persons.filter((x) => x !== p);
                        savePersons();
                        renderPersons();
                        notification.success("Person Removed");
                    };

                    list.appendChild(el);
                });
            }

            function addPerson() {
                const input = document.getElementById("personInput");
                if (!input.value) return;

                persons.push(input.value);
                input.value = "";
                savePersons();
                renderPersons();

                notification.success("Person Added");
            }

            function savePersons() {
                localStorage.setItem("persons", JSON.stringify(persons));
            }

            function saveData() {
                const data = [];

                document.querySelectorAll(".column").forEach((col) => {
                    const title = col.querySelector(".title").textContent;
                    const items = [];

                    col.querySelectorAll(".item").forEach((item) => {
                        items.push({
                            name: item.querySelector(".item-text").textContent,
                            qty: item.querySelector(".qty").textContent,
                            unit: item.querySelector(".unit").value,
                            person: item.querySelector(".personSelect").value,
                            price: item.querySelector(".price-input").value, // Saved price
                        });
                    });

                    data.push({ title, items });
                });

                localStorage.setItem("villaShopping", JSON.stringify(data));
                updateSummary(data); // Update table dynamically
            }

            function loadData() {
                const saved = localStorage.getItem("villaShopping");
                if (!saved) return;

                const data = JSON.parse(saved);
                container.innerHTML = "";

                data.forEach((cat) => {
                    const column = createCategory(cat.title);
                    container.appendChild(column);

                    const list = column.querySelector(".list");

                    cat.items.forEach((item) => {
                        addItem(
                            list,
                            item.name,
                            item.qty,
                            item.unit,
                            item.person,
                            item.price, // Pass price
                        );
                    });
                });

                updateSummary(data);
            }

            // Renders bottom summary table dynamically
            function updateSummary(data) {
                const summaryDiv = document.getElementById("summarySection");

                if (!data || data.length === 0) {
                    summaryDiv.style.display = "none";
                    return;
                }

                summaryDiv.style.display = "block";

                let html = `<h2>📊 Shopping & Payment Summary</h2>
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price/Unit</th>
                            <th>Qty</th>
                            <th>Assigned To</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>`;

                let personTotals = {};
                let grandTotal = 0;

                data.forEach((cat) => {
                    cat.items.forEach((item) => {
                        let p = parseFloat(item.price) || 0;
                        let q = parseFloat(item.qty) || 0;
                        let t = p * q;
                        let person = item.person || "Unassigned";

                        personTotals[person] = (personTotals[person] || 0) + t;
                        grandTotal += t;

                        html += `<tr>
                            <td>${item.name} <span style="color:#9ca3af;font-size:12px;">(${cat.title})</span></td>
                            <td>₹${p.toFixed(2)}</td>
                            <td>${item.qty} ${item.unit}</td>
                            <td>${person}</td>
                            <td>₹${t.toFixed(2)}</td>
                        </tr>`;
                    });
                });

                html += `</tbody></table>`;

                let totalsHtml = `<h3 style="margin-top: 25px;">💰 Total to Pay by Person</h3>
                <table class="summary-table" style="max-width: 400px;">
                    <thead>
                        <tr><th>Person</th><th>Amount to Pay</th></tr>
                    </thead>
                    <tbody>`;

                for (let person in personTotals) {
                    totalsHtml += `<tr>
                        <td><strong>${person}</strong></td>
                        <td>₹${personTotals[person].toFixed(2)}</td>
                    </tr>`;
                }

                totalsHtml += `<tr class="total-row">
                    <td>Grand Total</td>
                    <td>₹${grandTotal.toFixed(2)}</td>
                </tr>
                </tbody></table>`;

                summaryDiv.innerHTML = html + totalsHtml;
            }

            function exportData() {
                saveData();

                const data = {
                    persons,
                    categories: JSON.parse(
                        localStorage.getItem("villaShopping"),
                    ),
                };

                jsonBox.value = JSON.stringify(data, null, 2);
                notification.success("Export Ready");
            }

            function importData() {
                try {
                    const data = JSON.parse(jsonBox.value);

                    persons = data.persons || persons;
                    savePersons();

                    localStorage.setItem(
                        "villaShopping",
                        JSON.stringify(data.categories),
                    );

                    renderPersons();
                    loadData();

                    notification.success("Imported Successfully");
                } catch {
                    notification.success("Invalid JSON");
                }
            }

            function createCategory(name) {
                const column = document.createElement("div");
                column.className = "column";

                column.innerHTML = `
                <div class="header">
                    <span class="title">${name}</span>
                    <div>
                        <button class="rename-btn">Rename</button>
                        <button class="copy-btn">Copy</button>
                    </div>
                </div>

                <div class="add-section">
                    <input placeholder="Add item"/>
                    <button>Add</button>
                </div>

                <div class="list"></div>
                `;

                const input = column.querySelector("input");
                const list = column.querySelector(".list");

                list.addEventListener("dragover", (e) => e.preventDefault());

                list.addEventListener("drop", (e) => {
                    e.preventDefault();

                    const afterElement = getDragAfterElement(list, e.clientY);

                    if (afterElement == null) {
                        list.appendChild(draggedItem);
                    } else {
                        list.insertBefore(draggedItem, afterElement);
                    }

                    saveData();
                });

                column.querySelector(".add-section button").onclick = () => {
                    if (!input.value) return;
                    addItem(list, input.value);
                    input.value = "";
                    saveData();
                };

                column.querySelector(".rename-btn").onclick = () => {
                    const newName = prompt("Rename", name);
                    if (newName) {
                        column.querySelector(".title").textContent = newName;
                        saveData();
                        notification.success("Renamed");
                    }
                };

                column.querySelector(".copy-btn").onclick = () => {
                    const title = column.querySelector(".title").textContent;
                    copyCategory(title, list);
                };

                return column;
            }

            function addItem(
                list,
                text,
                qtyVal = 1,
                unitVal = "pcs",
                personVal = "",
                priceVal = "",
            ) {
                const item = document.createElement("div");
                item.className = "item";
                item.draggable = true;

                item.innerHTML = `
                <div class="delete">✕</div>

                <div style="display:flex;flex-direction:column;gap:8px;">
                    <span class="item-text" style="cursor:pointer;font-weight:500;">${text}</span>

                    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:4px;">

                        <div style="display:flex;align-items:center;gap:4px;">
                            <span style="font-size:13px;color:#6b7280">₹</span>
                            <input type="number" class="price-input" placeholder="Price" value="${priceVal}" min="0" step="0.01">
                        </div>

                        <div style="display:flex;align-items:center;gap:4px;">
                            <button class="minus" style="padding:2px 8px;">-</button>
                            <span class="qty" style="min-width:28px;text-align:center;cursor:pointer">${qtyVal}</span>
                            <button class="plus" style="padding:2px 8px;">+</button>
                        </div>

                        <select class="unit">
                            <option>pcs</option>
                            <option>kg</option>
                            <option>ltr</option>
                            <option>pack</option>
                            <option>gm</option>
                        </select>

                        <select class="personSelect"></select>
                    </div>
                </div>
                `;

                item.addEventListener("dragstart", () => {
                    draggedItem = item;
                    item.classList.add("dragging");
                    setTimeout(() => (item.style.display = "none"), 0);
                });

                item.addEventListener("dragend", () => {
                    setTimeout(() => (item.style.display = "block"), 0);
                    item.classList.remove("dragging");
                    draggedItem = null;
                    saveData();
                });

                const itemText = item.querySelector(".item-text");

                itemText.ondblclick = () => {
                    const newText = prompt("Edit item", itemText.textContent);
                    if (!newText) return;

                    itemText.textContent = newText;
                    saveData();
                    notification.success("Item Updated");
                };

                // Add listener to recalculate summary when price changes
                item.querySelector(".price-input").addEventListener(
                    "input",
                    saveData,
                );

                const qty = item.querySelector(".qty");
                const unit = item.querySelector(".unit");

                function allowDecimal() {
                    return ["kg", "ltr", "gm"].includes(unit.value);
                }

                item.querySelector(".minus").onclick = () => {
                    let val = parseFloat(qty.textContent);
                    val -= allowDecimal() ? 0.5 : 1;
                    if (val <= 0) val = 1;
                    qty.textContent = val;
                    saveData();
                };

                item.querySelector(".plus").onclick = () => {
                    let val = parseFloat(qty.textContent);
                    val += allowDecimal() ? 0.5 : 1;
                    qty.textContent = val;
                    saveData();
                };

                qty.ondblclick = () => {
                    const val = prompt("Enter quantity", qty.textContent);
                    if (!val) return;
                    qty.textContent = val;
                    saveData();
                };

                const personSelect = item.querySelector(".personSelect");
                personSelect.addEventListener("change", saveData);

                const none = document.createElement("option");
                none.value = "";
                none.textContent = "None";
                personSelect.appendChild(none);

                persons.forEach((p) => {
                    const opt = document.createElement("option");
                    opt.value = p;
                    opt.textContent = p;
                    personSelect.appendChild(opt);
                });

                unit.value = unitVal;
                personSelect.value = personVal;

                item.querySelector(".delete").onclick = () => {
                    item.remove();
                    saveData();
                };

                list.appendChild(item);
            }

            function copyCategory(name, list) {
                sortAll();

                let text = `🛒 ${name}\n\n`;
                const grouped = {};

                list.querySelectorAll(".item").forEach((item) => {
                    const itemName = item
                        .querySelector(".item-text")
                        .textContent.trim();
                    const qty = item.querySelector(".qty").textContent.trim();
                    const unit = item.querySelector(".unit").value.trim();
                    const price =
                        parseFloat(item.querySelector(".price-input").value) ||
                        0;
                    const total = price * parseFloat(qty);
                    const person =
                        item.querySelector(".personSelect").value ||
                        "Unassigned";

                    if (!grouped[person]) grouped[person] = [];

                    let lineStr = `• ${itemName} - ${qty} ${unit}`;
                    if (price > 0) lineStr += ` (₹${total.toFixed(2)})`;
                    grouped[person].push(lineStr);
                });

                Object.keys(grouped).forEach((person, index) => {
                    text += `${person}\n`;

                    grouped[person].forEach((line) => {
                        text += `${line}\n`;
                    });

                    if (index !== Object.keys(grouped).length - 1) {
                        text += `\n-------\n\n`;
                    }
                });

                navigator.clipboard.writeText(text);
                notification.success("Copied");
            }

            function addCategory() {
                const name = categoryInput.value;
                if (!name) return;

                container.appendChild(createCategory(name));
                categoryInput.value = "";

                saveData();
                notification.success("Category Added");
            }

            function sortAll() {
                document.querySelectorAll(".column").forEach((column) => {
                    const list = column.querySelector(".list");
                    const items = [...list.children];

                    items.sort((a, b) => {
                        const pA = (
                            a.querySelector(".personSelect").value || ""
                        ).toLowerCase();
                        const pB = (
                            b.querySelector(".personSelect").value || ""
                        ).toLowerCase();

                        if (pA < pB) return -1;
                        if (pA > pB) return 1;

                        const nA = a
                            .querySelector(".item-text")
                            .textContent.toLowerCase();
                        const nB = b
                            .querySelector(".item-text")
                            .textContent.toLowerCase();

                        return nA.localeCompare(nB);
                    });

                    items.forEach((i) => list.appendChild(i));
                });

                saveData();
                notification.success("Sorted");
            }

            function getDragAfterElement(container, y) {
                const draggableElements = [
                    ...container.querySelectorAll(".item:not(.dragging)"),
                ];

                return draggableElements.reduce(
                    (closest, child) => {
                        const box = child.getBoundingClientRect();
                        const offset = y - box.top - box.height / 2;

                        if (offset < 0 && offset > closest.offset) {
                            return { offset: offset, element: child };
                        } else {
                            return closest;
                        }
                    },
                    { offset: Number.NEGATIVE_INFINITY },
                ).element;
            }

            const container = document.getElementById("container");

            renderPersons();
            loadData();
        </script>
    </body>
</html>
